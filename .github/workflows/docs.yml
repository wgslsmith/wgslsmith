name: docs

on:
  push:
    paths:
      - .github/workflows/docs.yml
      - docs/**
      - README.md

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Triggering docs publish for ${{ github.ref }}"
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/wgslsmith/wgslsmith.github.io/dispatches \
            -d '{"event_type":"trigger-build","client_payload":{"ref":"${{ github.ref }}"}}'
